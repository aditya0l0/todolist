spring.application.name=todo
# ============================================================
# H2 (in-memory) Database Configuration
# ============================================================

# jdbc:h2:mem:tododb  — connect to an in-memory DB named "tododb"
spring.datasource.url=jdbc:h2:mem:tododb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate Configuration
# ============================================================

# H2's SQL dialect (tells Hibernate which SQL syntax to use)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop  — Creates the table on startup, drops it on shutdown.
# For learning: every restart gives you a clean slate.
# Other options: "update" (keeps data), "none" (no changes)
spring.jpa.hibernate.ddl-auto=create-drop

# Show the generated SQL in the terminal (great for learning!)
spring.jpa.show-sql=true

# ============================================================
# H2 Console — a browser-based DB viewer
# ============================================================
# Visit: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:tododb  |  Username: sa  |  Password: (leave blank)

spring.h2.console.enabled=true